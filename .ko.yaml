# base = alpine:root + busybox shell + 自带 ca-certificates(实测 bookworm-slim/ubuntu
# 都不带 CA bundle,出站 TLS 会 x509 报错;ko 无 Dockerfile 阶段装不了包)。
# musl 对 CGO_ENABLED=0 的静态 Go 二进制无影响;排障可直接 kubectl exec + apk add。
defaultBaseImage: alpine:3.21

builds:
  - id: ai-gateway
    main: ./cmd
    env:
      - GOCACHE=/tmp/ko-gocache
    flags:
      - -tags=embed_assets
    ldflags:
      - -s
      - -w
      - -X github.com/VaalaCat/ai-gateway/internal/version.Version={{.Env.VERSION}}
      - -X github.com/VaalaCat/ai-gateway/internal/version.Commit={{.Env.COMMIT}}
      - -X github.com/VaalaCat/ai-gateway/internal/version.BuildDate={{.Env.BUILD_DATE}}

defaultPlatforms:
  - linux/arm64
  - linux/amd64
